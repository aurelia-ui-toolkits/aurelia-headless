<div class="app-shell">
  <h1 class="app-title">Aurelia Headless UI</h1>

  <section class="demo-section">
    <h2 class="section-title">ui-button</h2>

    <demo-block title="Basic">
      <ui-button primary click.trigger="handleClick()">
        Click me
      </ui-button>
      <span class="status-text">Clicked: ${clickCount} times</span>
    </demo-block>

    <demo-block title="Disabled">
      <ui-button primary disabled>
        I'm disabled
      </ui-button>
    </demo-block>

    <demo-block title="Toggle disabled">
      <ui-button primary disabled.bind="isLoading" click.trigger="handleClick()">
        ${isLoading ? 'Loading...' : 'Submit'}
      </ui-button>
      <button click.trigger="toggleLoading()" class="btn-toggle">
        Toggle loading: ${isLoading}
      </button>
    </demo-block>

    <demo-block title="Outlined variant">
      <ui-button outlined click.trigger="handleClick()">
        Outlined
      </ui-button>
    </demo-block>
  </section>
</div>
