<div class="app-layout">
  <aside class="side-panel">
    <h1 class="app-title">Aurelia Headless UI</h1>
    <nav class="side-menu" aria-label="Components">
      <ui-list class="side-menu-list"
        items.bind="menuItems"
        selected.bind="selectedMenuItem"
        typeahead-field="title"
        list-select.trigger="navigate($event.detail.path)">
        <ui-list-item repeat.for="item of menuItems" value.bind="item">
          ${item.title}
        </ui-list-item>
      </ui-list>
    </nav>
  </aside>

  <main class="content-panel">
    <au-viewport></au-viewport>
  </main>
</div>
