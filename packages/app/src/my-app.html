<div class="app-layout">
  <aside class="side-panel">
    <h1 class="app-title">Aurelia Headless UI</h1>
    <nav class="side-menu" aria-label="Components">
      <button repeat.for="item of menuItems"
        type="button"
        class="side-menu__item ${isActive(item.path) ? 'is-active' : ''}"
        click.trigger="navigate(item.path)">
        ${item.title}
      </button>
    </nav>
  </aside>

  <main class="content-panel">
    <au-viewport></au-viewport>
  </main>
</div>
