<section class="demo-section">
  <h2 class="section-title">ui-list</h2>

  <demo-block title="Fallback to rendered items">
    <ui-list list-activate.trigger="onListActivate($event)" list-select.trigger="onListSelect($event)">
      <ui-list-item repeat.for="item of staticList" value.bind="item" active.bind="item.active"
        selected.bind="item.selected" disabled.bind="item.disabled">
        <span au-slot="leading">•</span>
        ${item.label}
        <span au-slot="secondary">Workspace section</span>
        <span au-slot="trailing">${item.category}</span>
      </ui-list-item>
    </ui-list>
  </demo-block>

  <demo-block title="Items bindable (virtual-ready)">
    <ui-list items.bind="virtualList" typeahead-field="label" selected.bind="selectedItem"
      style="height: 300px; overflow-y: auto;">
      <ui-list-item virtual-repeat.for="item of virtualList" value.bind="item" disabled.bind="item.disabled">
        <span au-slot="leading">${item.id}</span>
        ${item.label}
        <span au-slot="secondary">${item.id % 2 === 0 ? 'Synced recently' : 'Pending sync'}</span>
        <span au-slot="trailing">${item.category}</span>
      </ui-list-item>
    </ui-list>
    <span class="list-state">Selected: ${selectedItem?.label}</span>
  </demo-block>
</section>
